services:
  incidentiq:
    build: .
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - stores_volume:/app/stores
      - data_volume:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  stores_volume:
  data_volume:
